name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build case data
        shell: bash
        run: |
          python scripts/us_deep_review_pilot.py
          python scripts/us_drug_review_pilot.py
          python scripts/us_drug_review_pilot_round3.py
          python scripts/build_jurisdiction_data.py

      - name: Verify static site
        shell: bash
        run: |
          test -f public/index.html
          test -f public/data/cases.json
          test -d public/pdfs
          ! grep -RInE 'localhost:8000|file:///|[A-Za-z]:\\Users|MINERU_API_KEY=.*[^"]' public

      - name: Prepare Pages artifact
        shell: bash
        run: |
          mkdir -p pages-public/cn pages-public/us pages-public/data
          cp public/index.html public/app.js public/style.css public/.nojekyll pages-public/
          cp public/cn/index.html pages-public/cn/
          cp public/us/index.html pages-public/us/
          cp public/data/cases.json public/data/cn_cases.json public/data/us_cases.json pages-public/data/
          du -sh pages-public

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload public directory
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
