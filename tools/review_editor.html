<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>案例人工复核编辑器</title>
  <style>
    body { margin: 0; font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif; color: #1d2433; background: #f6f7f9; }
    header { padding: 16px 22px; background: #fff; border-bottom: 1px solid #d9dee7; }
    h1 { margin: 0 0 4px; font-size: 22px; }
    main { display: grid; grid-template-columns: 360px 1fr; gap: 16px; padding: 16px 22px; }
    aside, section { background: #fff; border: 1px solid #d9dee7; border-radius: 8px; padding: 14px; }
    label { display: block; margin: 10px 0 5px; font-weight: 700; }
    input, select, textarea, button { width: 100%; box-sizing: border-box; border: 1px solid #d9dee7; border-radius: 6px; padding: 8px; font: inherit; }
    textarea { min-height: 90px; resize: vertical; }
    button { cursor: pointer; background: #176b87; color: #fff; border-color: #176b87; font-weight: 700; }
    .row { padding: 10px; border-bottom: 1px solid #edf0f4; cursor: pointer; }
    .row:hover, .row.active { background: #e7f3f6; }
    .muted { color: #667085; font-size: 13px; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .actions { display: flex; gap: 10px; margin-top: 12px; }
    .actions button { width: auto; }
    pre { white-space: pre-wrap; background: #f8fafc; padding: 10px; border-radius: 6px; max-height: 180px; overflow: auto; }
    @media (max-width: 980px) { main { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>案例人工复核编辑器</h1>
    <div class="muted">本工具只在本地使用。保存时会下载 overrides JSON，你需要用下载文件替换 data/manual_overrides/ 中对应文件后，再重新运行 build 脚本。</div>
  </header>

  <main>
    <aside>
      <label for="jurisdiction">案例库</label>
      <select id="jurisdiction">
        <option value="cn">中国</option>
        <option value="us">美国</option>
      </select>

      <label for="fieldFilter">复核字段</label>
      <select id="fieldFilter"><option value="">全部</option></select>

      <label for="query">搜索</label>
      <input id="query" type="search" placeholder="case_id、标题、字段、原因">

      <div class="actions">
        <button id="loadBtn" type="button">加载数据</button>
        <button id="exportBtn" type="button">导出 overrides</button>
      </div>

      <p class="muted" id="status">请先加载数据。</p>
      <div id="queue"></div>
    </aside>

    <section>
      <h2 id="caseTitle">请选择一个待复核字段</h2>
      <div class="grid">
        <div>
          <label>case_id</label>
          <input id="caseId" readonly>
        </div>
        <div>
          <label>field_name</label>
          <input id="fieldName" readonly>
        </div>
      </div>

      <label>PDF</label>
      <a id="pdfLink" href="#" target="_blank" rel="noopener">打开 PDF</a>

      <label>当前值</label>
      <pre id="currentValue"></pre>

      <label for="newValue">修正值</label>
      <textarea id="newValue" placeholder="数组或对象可填写 JSON；普通字段直接填写文本。"></textarea>

      <label for="notes">备注</label>
      <textarea id="notes"></textarea>

      <div class="actions">
        <button id="saveFieldBtn" type="button">加入导出清单</button>
      </div>

      <h3>当前待导出的 overrides</h3>
      <pre id="overridePreview">{}</pre>
    </section>
  </main>

  <script>
    const state = { cases: [], queue: [], selected: null, overrides: {}, jurisdiction: "cn" };
    const $ = (id) => document.getElementById(id);

    function parseCsv(text) {
      const rows = [];
      const lines = text.replace(/^\uFEFF/, "").split(/\r?\n/).filter(Boolean);
      const headers = lines.shift().split(",");
      for (const line of lines) {
        const values = [];
        let value = "", quoted = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"' && line[i + 1] === '"') { value += '"'; i++; }
          else if (ch === '"') quoted = !quoted;
          else if (ch === "," && !quoted) { values.push(value); value = ""; }
          else value += ch;
        }
        values.push(value);
        rows.push(Object.fromEntries(headers.map((h, i) => [h, values[i] || ""])));
      }
      return rows;
    }

    function tryParseValue(text) {
      const trimmed = text.trim();
      if (!trimmed) return "";
      if (trimmed.startsWith("[") || trimmed.startsWith("{")) {
        return JSON.parse(trimmed);
      }
      return trimmed;
    }

    async function loadData() {
      state.jurisdiction = $("jurisdiction").value;
      const casePath = state.jurisdiction === "cn" ? "../public/data/cn_cases.json" : "../public/data/us_cases.json";
      const [caseData, queueText] = await Promise.all([
        fetch(casePath).then((r) => r.json()),
        fetch("../reports/review_queue.csv").then((r) => r.text()),
      ]);
      state.cases = caseData.cases || [];
      state.queue = parseCsv(queueText).filter((row) => row.jurisdiction === state.jurisdiction);
      const fields = [...new Set(state.queue.map((row) => row.field_name).filter(Boolean))].sort();
      $("fieldFilter").innerHTML = '<option value="">全部</option>' + fields.map((f) => `<option value="${f}">${f}</option>`).join("");
      renderQueue();
    }

    function renderQueue() {
      const field = $("fieldFilter").value;
      const query = $("query").value.toLowerCase();
      const rows = state.queue.filter((row) => {
        if (field && row.field_name !== field) return false;
        return !query || JSON.stringify(row).toLowerCase().includes(query);
      });
      $("status").textContent = `显示 ${rows.length} / ${state.queue.length} 条待复核字段。`;
      $("queue").innerHTML = rows.slice(0, 300).map((row, i) => `
        <div class="row" data-i="${state.queue.indexOf(row)}">
          <strong>${row.case_id}</strong> <span class="muted">${row.field_name}</span>
          <div class="muted">${row.reason}</div>
        </div>
      `).join("");
      document.querySelectorAll(".row").forEach((node) => node.addEventListener("click", () => selectRow(Number(node.dataset.i))));
    }

    function selectRow(index) {
      state.selected = state.queue[index];
      const item = state.cases.find((caseItem) => caseItem.case_id === state.selected.case_id) || {};
      $("caseTitle").textContent = item.title || item.patent_title || state.selected.case_id;
      $("caseId").value = state.selected.case_id;
      $("fieldName").value = state.selected.field_name;
      $("pdfLink").href = "../public/" + (item.pdf || state.selected.pdf || "");
      $("currentValue").textContent = state.selected.current_value || "";
      $("newValue").value = state.selected.suggested_value || "";
      $("notes").value = "";
    }

    function saveField() {
      if (!state.selected) return;
      const caseId = state.selected.case_id;
      const field = state.selected.field_name;
      if (!state.overrides[caseId]) state.overrides[caseId] = {};
      state.overrides[caseId][field] = tryParseValue($("newValue").value);
      if ($("notes").value.trim()) state.overrides[caseId].notes = $("notes").value.trim();
      $("overridePreview").textContent = JSON.stringify(state.overrides, null, 2);
    }

    function exportOverrides() {
      const blob = new Blob([JSON.stringify(state.overrides, null, 2) + "\n"], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = state.jurisdiction === "cn" ? "cn_overrides.json" : "us_overrides.json";
      a.click();
      URL.revokeObjectURL(url);
    }

    $("loadBtn").addEventListener("click", loadData);
    $("fieldFilter").addEventListener("change", renderQueue);
    $("query").addEventListener("input", renderQueue);
    $("saveFieldBtn").addEventListener("click", saveField);
    $("exportBtn").addEventListener("click", exportOverrides);
  </script>
</body>
</html>
